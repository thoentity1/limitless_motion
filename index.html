<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Limitless Motion Dance</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:Poppins, sans-serif;
    background:#b88982;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
    overflow:hidden;
}

/* SOFT BACKGROUND SHAPES */
body::before {
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:rgba(255,255,255,0.1);
    border-radius:50%;
    top:-100px;
    left:-100px;
    filter:blur(80px);
}

body::after {
    content:"";
    position:absolute;
    width:400px;
    height:400px;
    background:rgba(0,0,0,0.1);
    border-radius:50%;
    bottom:-100px;
    right:-100px;
    filter:blur(80px);
}

/* CONTAINER */
.container {
    position:relative;
    z-index:1;
    animation:fadeIn 1.5s ease-in-out;
}

/* LOGO */
.logo {
    max-width:260px;
}

/* TEXT */
h1 {
    margin-top:20px;
    font-weight:600;
    color:#222;
    letter-spacing:1px;
}

/* BUTTON */
.btn {
    display:inline-block;
    margin-top:25px;
    padding:12px 25px;
    background:#000;
    color:#fff;
    text-decoration:none;
    border-radius:5px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover {
    background:#333;
}

/* ANIMATIONS */
@keyframes fadeIn {
    from {opacity:0; transform:scale(0.95);}
    to {opacity:1; transform:scale(1);}
}

.fade-out {
    animation:fadeOut 1s forwards;
}

@keyframes fadeOut {
    to {opacity:0;}
}
</style>

<script>
setTimeout(function(){
    document.body.classList.add("fade-out");

    setTimeout(function(){
        window.location.href = "home.html";
    }, 800);

}, 2500);
</script>

</head>

<body>

<div class="container">
    <img src="limitless_logo.png" alt="Limitless Motion Logo" class="logo">
    <h1>Move Without Limits</h1>

    <a href="home.html" class="btn">Enter Site</a>
</div>

</body>
</html>
