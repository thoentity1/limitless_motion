<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Limitless Motion Dance</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:Poppins, sans-serif;
    background:#b88982;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

/* LOGO */
.logo {
    max-width:280px;
    animation:fadeIn 1.5s ease-in-out;
}

/* TEXT */
h1 {
    margin-top:20px;
    font-weight:600;
    color:#222;
}

/* BUTTON */
.btn {
    display:inline-block;
    margin-top:25px;
    padding:12px 25px;
    background:#000;
    color:#fff;
    text-decoration:none;
    border-radius:5px;
    font-weight:bold;
}

/* FADE ANIMATION */
@keyframes fadeIn {
    from {opacity:0; transform:scale(0.9);}
    to {opacity:1; transform:scale(1);}
}
</style>

<!-- AUTO REDIRECT AFTER 3 SECONDS -->
<script>
setTimeout(function(){
    window.location.href = "home.html";
}, 3000);
</script>

</head>

<body>

<div>
    <img src="limitless_logo.png" alt="Limitless Motion Logo" class="logo">
    <h1>Move Without Limits</h1>

    <!-- Manual button (in case user doesn't want to wait) -->
    <a href="home.html" class="btn">Enter Site</a>
</div>

</body>
</html>
