<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join a Class | Limitless Motion Dance</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:Poppins, sans-serif;
    background:#b88982;
    color:#222;
}

header {
    text-align:center;
    padding:30px 20px;
}

.logo {
    max-width:180px;
}

nav {
    text-align:center;
    padding:15px;
}

nav a {
    margin:0 15px;
    text-decoration:none;
    color:#222;
    font-weight:500;
}

.section {
    padding:50px 20px;
    text-align:center;
}

form {
    max-width:400px;
    margin:0 auto;
    background:#f2d6d2;
    padding:25px;
    border-radius:12px;
}

input, select {
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:5px;
}

button {
    background:#000;
    color:#fff;
    padding:12px;
    border:none;
    width:100%;
    border-radius:5px;
    font-weight:bold;
}

footer {
    text-align:center;
    padding:20px;
    background:#222;
    color:white;
    font-size:14px;
}
</style>
</head>

<body>

<header>
    <img src="limitless_logo.jpeg.png" alt="Limitless Motion Logo" class="logo">
    <h2>Join a Class</h2>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="classes.html">Classes</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<section class="section">
    <h1>Register Now</h1>

    <form>
        <input type="text" placeholder="Full Name" required>
        <input type="tel" placeholder="Phone Number" required>

        <select required>
            <option value="">Select Class</option>
            <option>Ballet</option>
            <option>Hip Hop</option>
            <option>Contemporary</option>
            <option>Jazz</option>
        </select>

        <button type="submit">Join Class</button>
    </form>

</section>

<footer>
    <p>© 2026 Limitless Motion Dance</p>
</footer>

</body>
</html>
